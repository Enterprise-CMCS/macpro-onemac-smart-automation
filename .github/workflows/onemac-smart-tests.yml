name: OneMAC SMART Test Suite
run-name: "OneMAC SMART Tests"

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: excel-sync
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      OSG_QA_USERNAME: ${{ secrets.OSG_QA_USERNAME }}
      PASSWORD: ${{ secrets.PASSWORD }}
      APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
      OSG_QA_SECRET: ${{ secrets.OSG_QA_SECRET }}
      EMAIL: ${{ secrets.EMAIL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Check Salesforce Connectivity
        run: |
          echo "Testing connectivity to Salesforce..."
          
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://cmsapps5--cmcsmcqa.sandbox.my.salesforce.com)
          
          echo "HTTP Status: $STATUS"
          
          if [ "$STATUS" -ge 400 ]; then
            echo "❌ Runner cannot access Salesforce (blocked or denied)"
            exit 1
          else
            echo "✅ Salesforce reachable"
          fi



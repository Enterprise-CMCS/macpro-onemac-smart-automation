name: OneMAC SMART Test Suite
run-name: "OneMAC SMART Tests"

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: excel-sync
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      EMAIL: ${{ secrets.EMAIL }
      APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
      OSG_QA_USERNAME: ${{ secrets.OSG_QA_USERNAME }}
      OSG_QA_PASSWORD: ${{ secrets.OSG_QA_PASSWORD }}
      OSG_QA_SECRET: ${{ secrets.OSG_QA_SECRET }}}
      CPOC_QA_USERNAME: ${{ secrets.CPOC_QA_USERNAME }}
      CPOC_QA_PASSWORD: ${{ secrets.CPOC_QA_PASSWORD }}
      CPOC_QA_SECRET: ${{ secrets.CPOC_QA_SECRET }}}
      SRT_QA_USERNAME: ${{ secrets.SRT_QA_USERNAME }}
      SRT_QA_PASSWORD: ${{ secrets.SRT_QA_PASSWORD }}
      SRT_QA_SECRET: ${{ secrets.SRT_QA_SECRET }}}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Set browser and headless from config
        shell: pwsh
        run: |
          $configPath = "src/test/resources/config.properties"
          $browser = (Select-String -Path $configPath -Pattern "browser\s*=").ToString().Split("=")[1].Trim()
          $headless = (Select-String -Path $configPath -Pattern "headless\s*=").ToString().Split("=")[1].Trim()

          Add-Content -Path $env:GITHUB_ENV -Value "BROWSER=$browser"
          Add-Content -Path $env:GITHUB_ENV -Value "HEADLESS=$headless"

      - name: Set RUNON_ENV from config
        shell: pwsh
        run: |
          $configPath = "src/test/resources/config.properties"

          $runOnLine = Select-String -Path $configPath -Pattern "^runOn\s*="
          $runOn = $runOnLine.ToString().Split("=")[1].Trim()

          if (-not $runOn) {
            Write-Output "runOn not set in config.properties"
            exit 1
          }

          Add-Content -Path $env:GITHUB_ENV -Value "RUNON_ENV=$runOn"
          Write-Output "RUNON_ENV set to $runOn"

      - name: Run OneMAC Smart Suite
        shell: pwsh
        continue-on-error: true
        run: |
          $suiteFile = "src/test/resources/OneMACSmart.xml"
          Write-Output "Running E2E Suite with suite file: $suiteFile"

          & mvn clean test `
            "-DsuiteXmlFile=$suiteFile" `
            "-Dtestng.parameters.browser=$env:BROWSER" `
            "-Dtestng.parameters.headless=$env:HEADLESS" `
            "-Duser.timezone=America/New_York"

      - name: Verify dashboard exists (CI)
        if: always()
        shell: bash
        run: |
          echo "Looking for dashboards..."
          find . -maxdepth 7 -type f -name "TestCoverageDashboard*.xlsx" -print || true
          echo "Listing src/test/resources..."
          ls -la src/test/resources || true
          echo "Listing target/test-classes..."
          ls -la target/test-classes || true

      - name: Stage Excel Dashboard into artifact folder
        if: always()
        shell: bash
        run: |
          mkdir -p dashboard/TestCoverageDashboard

          # Prefer src/test/resources; fall back to target/test-classes
          if [ -f "src/test/resources/TestCoverageDashboard_${{ env.RUNON_ENV }}.xlsx" ]; then
            cp "src/test/resources/TestCoverageDashboard_${{ env.RUNON_ENV }}.xlsx" "dashboard/TestCoverageDashboard/"
          elif [ -f "target/test-classes/TestCoverageDashboard_${{ env.RUNON_ENV }}.xlsx" ]; then
            cp "target/test-classes/TestCoverageDashboard_${{ env.RUNON_ENV }}.xlsx" "dashboard/TestCoverageDashboard/"
          else
            echo "Dashboard Excel file not found for env=${{ env.RUNON_ENV }}"
            find . -maxdepth 6 -name "TestCoverageDashboard*.xlsx" -print || true
          fi

      - name: Upload Extent Report & Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: OneMAC-SMART-Report
          path: |
            extent-report/**
            screenshots/**
            dashboard/**
          if-no-files-found: warn

      - name: Configure Git Identity
        if: always()
        shell: pwsh
        run: |
          git config user.name "Amjad"
          git config user.email "jad.ammar.co@gmail.com"

      - name: Stage environment files
        shell: pwsh
        run: |
          $configPath = "src/test/resources/config.properties"

          if (!(Test-Path $configPath)) {
            Write-Output "config.properties not found!"
            exit 1
          }

          $runOnLine = Select-String -Path $configPath -Pattern "^runOn\s*="
          $runOn = $runOnLine.ToString().Split("=")[1].Trim()

          if (-not $runOn) {
            Write-Output "runOn not set in config.properties"
            exit 1
          }

          $counterFile = "src/test/resources/state_counters_$runOn.xlsx"
          $packagesFile = "src/test/resources/packages_$runOn.xlsx"

          $updated = 0

          if (Test-Path $counterFile) {
            git add $counterFile
            $updated = 1
          }

          if (Test-Path $packagesFile) {
            git add $packagesFile
            $updated = 1
          }

          Add-Content -Path $env:GITHUB_ENV -Value "UPDATED=$updated"
          Add-Content -Path $env:GITHUB_ENV -Value "RUNON_ENV=$runOn"

      - name: Commit & Push Excel Updates
        if: always()
        shell: pwsh
        run: |
          if ($env:UPDATED -eq "1") {
            if (-not (git diff --cached --quiet)) {
              git commit -m "CI: Update Excel counters for $env:RUNON_ENV environment"
              git fetch origin main
              git pull origin main --rebase
              git push origin HEAD:main
            }
          }


      - name: Extract Test Summary
        if: always()
        shell: bash
        run: |
          FILE="extent-report/OneMAC-SMART-TestReport.json"

          if [ -f "$FILE" ]; then
            PASSED=$(jq '[.[] | select(.status == "PASS")] | length' "$FILE")
            FAILED=$(jq '[.[] | select(.status == "FAIL")] | length' "$FILE")
            SKIPPED=$(jq '[.[] | select(.status == "SKIP")] | length' "$FILE")
          else
            PASSED=0
            FAILED=0
            SKIPPED=0
          fi

          TOTAL=$((PASSED + FAILED + SKIPPED))

          if [ "$TOTAL" -gt 0 ]; then
            PASS_RATE=$((PASSED * 100 / TOTAL))
          else
            PASS_RATE=0
          fi

          echo "PASSED=$PASSED" >> $GITHUB_ENV
          echo "FAILED=$FAILED" >> $GITHUB_ENV
          echo "SKIPPED=$SKIPPED" >> $GITHUB_ENV
          echo "TOTAL=$TOTAL" >> $GITHUB_ENV
          echo "PASS_RATE=$PASS_RATE" >> $GITHUB_ENV



name: OneMAC SMART Test Suite
run-name: "OneMAC SMART Tests"

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: excel-sync
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      OSG_QA_USERNAME: ${{ secrets.OSG_QA_USERNAME }}
      PASSWORD: ${{ secrets.PASSWORD }}
      APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
      OSG_QA_SECRET: ${{ secrets.OSG_QA_SECRET }}
      EMAIL: ${{ secrets.EMAIL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Preflight Salesforce Connectivity
        run: |
          echo "Runner IP:"
          curl -s https://api.ipify.org
          echo ""
          
          URLS=(
            "https://cmsapps5--cmcsmcqa.sandbox.my.salesforce.com"
            "https://c.salesforce.com"
            "https://login.salesforce.com"
          )
          
          for URL in "${URLS[@]}"
          do
            echo "Checking $URL"
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" $URL)
            echo "HTTP Status: $STATUS"
          
            if [ "$STATUS" -ge 400 ]; then
              echo "❌ Cannot access $URL"
              exit 1
            fi
          done
          
          echo "✅ Salesforce domains reachable"

